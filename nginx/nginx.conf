events {}

http {

    # --- Редирект с HTTP на HTTPS ---
    server {
        listen 80;
        server_name av-kushnarenko.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name av-kushnarenko.ru;

        ssl_certificate     /etc/letsencrypt/live/av-kushnarenko.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/av-kushnarenko.ru/privkey.pem;

        # --- API Риты ---
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- WebSocket для чатов (Upgrade/Connection) ---
        location /ws/ {
            proxy_pass http://backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # --- Фронтенд Маши ---
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
